<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GYOZA — ラーメン盛り付けエージェント</title>
<style>
  :root { --bg:#0e1116; --panel:#161b22; --line:#232a34; --fg:#e6edf3; --dim:#8b949e;
          --agent:#58a6ff; --sys:#3fb950; --verdict-ok:#3fb950; --verdict-no:#f85149; --err:#f85149; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,"Hiragino Kaku Gothic ProN",system-ui,sans-serif;
         background:var(--bg); color:var(--fg); height:100vh; display:flex; flex-direction:column; }
  header { display:flex; align-items:center; gap:16px; padding:12px 20px; border-bottom:1px solid var(--line); }
  header h1 { font-size:16px; margin:0; font-weight:600; letter-spacing:.02em; }
  header .sub { color:var(--dim); font-size:12px; }
  header .spacer { flex:1; }
  button { background:var(--agent); color:#04101f; border:0; padding:9px 18px; border-radius:7px;
           font-weight:600; font-size:13px; cursor:pointer; }
  button:disabled { opacity:.45; cursor:default; }
  main { flex:1; display:grid; grid-template-columns: 1fr 380px; gap:14px; padding:14px; min-height:0; }
  .stage { background:#000; border:1px solid var(--line); border-radius:10px; overflow:hidden;
           display:flex; align-items:center; justify-content:center; position:relative; }
  .stage img { width:100%; height:100%; object-fit:contain; }
  .stage .badge { position:absolute; top:10px; left:12px; background:#0009; color:var(--fg);
                  font-size:11px; padding:4px 8px; border-radius:5px; }
  .side { background:var(--panel); border:1px solid var(--line); border-radius:10px;
          display:flex; flex-direction:column; min-height:0; }
  .side h2 { font-size:12px; color:var(--dim); margin:0; padding:12px 14px; border-bottom:1px solid var(--line);
             text-transform:uppercase; letter-spacing:.08em; }
  #trace { flex:1; overflow-y:auto; padding:8px; font:12px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; }
  .row { padding:6px 9px; margin:3px 0; border-radius:6px; background:#0d1117; border-left:3px solid var(--line); }
  .row.agent { border-left-color:var(--agent); }
  .row.system { border-left-color:var(--sys); color:var(--dim); }
  .row.verdict-ok { border-left-color:var(--verdict-ok); }
  .row.verdict-no { border-left-color:var(--verdict-no); }
  .row.error { border-left-color:var(--err); color:var(--err); }
  .row .tag { color:var(--dim); font-size:10px; text-transform:uppercase; letter-spacing:.06em; }
</style>
</head>
<body>
<header>
  <h1>🍜 GYOZA</h1>
  <span class="sub">VLM オーケストレータ × ACT スキルによるラーメン盛り付け</span>
  <span class="spacer"></span>
  <button id="run">盛り付け開始</button>
</header>
<main>
  <div class="stage">
    <span class="badge" id="badge">俯瞰カメラ (overhead)</span>
    <img id="view" alt="live preview">
  </div>
  <div class="side">
    <h2>Agent trace</h2>
    <div id="trace"></div>
  </div>
</main>
<script>
const view = document.getElementById('view');
const trace = document.getElementById('trace');
const btn = document.getElementById('run');
const badge = document.getElementById('badge');

function addRow(cls, tag, text) {
  const d = document.createElement('div');
  d.className = 'row ' + cls;
  d.innerHTML = '<span class="tag">' + tag + '</span> ' + text.replace(/</g,'&lt;');
  trace.appendChild(d);
  trace.scrollTop = trace.scrollHeight;
}

btn.onclick = () => {
  btn.disabled = true;
  trace.innerHTML = '';
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(proto + '://' + location.host + '/ws');
  ws.onmessage = (e) => {
    const ev = JSON.parse(e.data);
    if (ev.type === 'frame') { view.src = 'data:image/jpeg;base64,' + ev.data; }
    else if (ev.type === 'trace') { addRow(ev.role, ev.role, ev.text); }
    else if (ev.type === 'verdict') { addRow(ev.ok ? 'verdict-ok' : 'verdict-no', 'postcondition', ev.text); }
    else if (ev.type === 'done') { addRow('system','done','—'); btn.disabled = false; badge.textContent='完了'; }
  };
  ws.onclose = () => { btn.disabled = false; };
  ws.onerror = () => { addRow('error','error','websocket error'); btn.disabled = false; };
};
</script>
</body>
</html>
